<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" type="image/png" href="F:/Coding Thunder/game/Img Files/cardicon.png">
        
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <meta charset="UTF-8">

        <title>Concentration</title>
        
        <style>
            * {
                box-sizing: border-box;
            }
            body {
                background-image: url('F:/Coding Thunder/game/Img Files/gamecardbg.jpg');
                background-attachment: fixed;
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
                margin: 0;
            }
            #header {
                display: flex;
                height: 10vh;
                margin: 5vh;
            }
            #heading {
                align-self: auto;
                margin: auto;
                align-self: center;
                text-decoration: none;
                font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
                font-size: 6.5vh;
                background: linear-gradient(to right, gold,aqua);
                background-clip: text;
                color: transparent;
            }
            #log_page:link, #log_page:visited {
                color: white;
                background-color:blue;
                padding: 20px;
                text-decoration: none;
                margin: 1vw;
                text-align: right;
                font-size: 1.5vw;
                height: fit-content;
                width: fit-content;
                position: relative;
                border: 3px solid silver;
                border-radius: 10px;
            }
            #log_page:active, #log_page:hover {
                color: gold;
                background-color: navy;
                border: 3px solid gold;
                border-radius: 10px;
            }
            #Home_Page:link, #Home_Page:visited {
                color: transparent;
                padding: 20px;
                text-decoration: none;
                margin: 1vw;
                text-align: left;
                font-size: 1.5vw;
                height: fit-content;
                width: fit-content;
                position: relative;
                border-radius: 10px;
                border: 3px none silver;
            }
            form {
                display: flex;
                height: 65vh;
                margin: 5vh;
                flex-flow: column nowrap;
                justify-content: center;
            }
            #gamename {
                color: white;
                font-family: cursive;
                font-size: xx-large;
                align-self: center;
                margin: 20px;
            }
            #name {
                color: #00FFFF;
                background-color: transparent;
                text-decoration: none;
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: x-large;
                height: fit-content;
                width: fit-content;
                outline-style: none;
                text-align: center;
                align-self: center;
                margin: 20px;
            }
            #tocardgame {
                position: relative;
                align-self: center;
                margin: 50px;
                width: fit-content;
                height: fit-content;
                padding: 20px;
                font-size: 2vw;
                border: 5px solid transparent;
                text-decoration: none;
                text-align: center;
                color: rgb(255, 217, 0);
                background-color: blue;
                font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            }
            footer {
                display: flex;
                height: 10vh;
                background-color: rgba(0, 0, 0, 0.516);
            }
            li {
                color: white;
                font-family: serif;
                padding: 5px;
                font-size: medium;
            }
            #tocardgame:hover, #tocardgame:active {
                box-shadow: 0 0 40px 10px goldenrod;
                background-color: navy;
                border-style: solid;
                border-color: gold;
                border-width: 5px;
                color: gold;
                                
            }
        </style>
    </head>
    <body>
        <header id="header">
            <a href="home.html" id="Home_Page">____</a>
            <p id="heading">Concentration</p>  
            <a href="login.html" id="log_page">Log In</a>  
        </header>
        <main>
            <form action="game.html">
                <label for="gamename" id="gamename">&nbsp;Enter Your Name</label>
                <input type="text" name="gamename" id="name" placeholder="Enter Name" required>
                <input href="game.html" type="submit" id="tocardgame" name="gamename" value="Start Game">
            </form>
        </main>
        <footer>
            <ul>
                <li>I feel a great amount of pleasure knowing you tested my very first project. It would be most gladdening to receive your reviews and suggestions.</li>
            </ul>    
            
        </footer>
    </body>
</html>
